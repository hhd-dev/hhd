title: Battery Settings
type: container
tags: [ hide-title ]
children:
  charge_limit:
    type: multiple
    title: Charge Limit (%)
    tags: [ non-essential, ordinal ]
    hint: >-
      Applies a charge limit to the battery, 75% and up.
    options:
      p70: 70%
      p80: 80%
      p85: 85%
      p90: 90%
      p95: 95%
      disabled: Unset
    default: disabled

  charge_once:
    type: action
    title: Charge to 100% Once
    tags: [ non-essential ]
    hint: >-
      Temporarily disables the charge limit until the charger is unplugged.

  charge_once_restore:
    type: action
    title: Restore Charge Limit
    tags: [ non-essential ]
    hint: >-
      Re-enables the charge limit now, before unplugging.

  charge_bypass:
    type: multiple
    title: Charge Bypass
    tags: [ non-essential, ordinal ]
    options:
      disabled: Unset
      awake: While On
      always: Always
    default: disabled